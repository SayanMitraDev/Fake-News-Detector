<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-xl">
    
    <h1 class="text-3xl font-bold mb-6 text-center">
        📰 Fake News Detector
    </h1>

    <form method="POST">
        <textarea 
            name="news" 
            placeholder="Paste news text here..."
            required
            class="w-full p-4 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            rows="6"
        ></textarea>

        <button 
            type="submit"
            class="w-full mt-4 bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-semibold"
        >
            Analyze
        </button>
    </form>

    {% if prediction %}
    <div class="mt-6 p-4 bg-gray-700 rounded-lg text-center text-xl">
        {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
